name: Firebase Functions CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your matching project Node version
      

      - name: Install Dependencies
        # This installs firebase-tools from your project dependencies, or safely fallback
        run: |
          npm install -g firebase-tools
          npm ci

      - name: Deploy Firebase Functions
        # Firebase automatically catches credential payloads mapped to this env block
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: firebase deploy --only functions
